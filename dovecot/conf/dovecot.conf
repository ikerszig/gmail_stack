# Single-user IMAP server serving a Gmail mirror (Maildir).
# Auth comes from a passwd-file bind-mounted at /etc/dovecot/passwd
# (see secrets/README.md for how to generate it — that file is gitignored).

listen = *
protocols = imap

mail_location = maildir:/srv/mail/maildir/%u

ssl = required
ssl_cert = </etc/letsencrypt/live/ikermail.ddns.net/fullchain.pem
ssl_key = </etc/letsencrypt/live/ikermail.ddns.net/privkey.pem

disable_plaintext_auth = yes

passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT username_format=%u /etc/dovecot/passwd
}

userdb {
  driver = static
  args = uid=1000 gid=1000 home=/srv/mail/maildir/%u
}

service imap-login {
  inet_listener imap {
    port = 0
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}
