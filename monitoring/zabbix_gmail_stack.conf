# Zabbix Agent 2 UserParameters for gmail_stack health.
# Deploy: /etc/zabbix/zabbix_agent2.d/gmail_stack.conf  then restart zabbix-agent2.
#
# Two status files, both written by root cron, both just cat/awk'd by the
# unprivileged zabbix agent user (no docker/root/borg privileges needed at
# poll time):
#   - /var/lib/gmail_stack_monitor/status       (gmail_stack_monitor.sh:
#     Dovecot, Calendar sync, mailbox sizes, Borg backup health)
#   - /var/lib/gmail_stack_monitor/sync_status  (gmail_stack_sync.sh: Gmail
#     mbsync sync+prune run - it's the sole mbsync caller, so it writes its
#     own outcome directly instead of anything re-deriving it from logs)
#
# Values: *_running 1=up 0=down; sync_last_ok 1=last sync run ended clean;
# sync_age_min minutes since gmail_stack_sync.sh last ran; sync_fail 1 if
# that run did not end clean; prune_last_removed orphaned mailboxes cleaned
# up in that run; prune_last_errors problems the prune step itself hit
# (IMAP re-check mismatch, failed post-prune resync) - 0 in normal
# operation, including whenever orphans were found and cleanly removed;
# borg_age_hours age of newest archive; borg_check_result 0=ok 1=fail
# -1=never run; borg_check_age_days days since last integrity check.
# -1 = unknown throughout.

UserParameter=gmail_stack.sync_running,awk '/^sync_running /{print $2}' /var/lib/gmail_stack_monitor/sync_status 2>/dev/null
UserParameter=gmail_stack.dovecot_running,awk '/^dovecot_running /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.vdirsyncer_running,awk '/^vdirsyncer_running /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.sync_age_min,awk -v now=$(date +%s) '/^sync_last_run /{print int((now-$2)/60)}' /var/lib/gmail_stack_monitor/sync_status 2>/dev/null
UserParameter=gmail_stack.sync_fail,awk '/^sync_last_ok /{print 1-$2}' /var/lib/gmail_stack_monitor/sync_status 2>/dev/null
UserParameter=gmail_stack.vdirsyncer_age_min,awk '/^vdirsyncer_age_min /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.vdirsyncer_fail,awk '/^vdirsyncer_fail /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.maildir_size_main,awk '/^maildir_size_main /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.maildir_size_save,awk '/^maildir_size_save /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.borg_age_hours,awk '/^borg_age_hours /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.borg_check,awk '/^borg_check_result /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.borg_check_age,awk '/^borg_check_age_days /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null

UserParameter=gmail_stack.prune_last_run,awk '/^sync_last_run /{print $2}' /var/lib/gmail_stack_monitor/sync_status 2>/dev/null
UserParameter=gmail_stack.prune_last_removed,awk '/^prune_last_removed /{print $2}' /var/lib/gmail_stack_monitor/sync_status 2>/dev/null
UserParameter=gmail_stack.prune_last_errors,awk '/^prune_last_errors /{print $2}' /var/lib/gmail_stack_monitor/sync_status 2>/dev/null
