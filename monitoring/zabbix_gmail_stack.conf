# Zabbix Agent 2 UserParameters for gmail_stack health.
# Deploy: /etc/zabbix/zabbix_agent2.d/gmail_stack.conf  then restart zabbix-agent2.
#
# All values come from the fast status file written by the root cron
# (gmail_stack_monitor.sh) — the agent (zabbix user) only reads it, so no
# docker/root/borg privileges are needed at poll time.
#
# Values: *_running 1=up 0=down; sync_age_min minutes since last sync loop;
# sync_fail count of recent "sync failed" log lines; borg_age_hours age of
# newest archive; borg_check_result 0=ok 1=fail -1=never run;
# borg_check_age_days days since last integrity check. -1 = unknown.

UserParameter=gmail_stack.sync_running,awk '/^sync_running /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.dovecot_running,awk '/^dovecot_running /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.vdirsyncer_running,awk '/^vdirsyncer_running /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.sync_age_min,awk '/^sync_age_min /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.sync_fail,awk '/^sync_fail /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.vdirsyncer_age_min,awk '/^vdirsyncer_age_min /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.vdirsyncer_fail,awk '/^vdirsyncer_fail /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.borg_age_hours,awk '/^borg_age_hours /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.borg_check,awk '/^borg_check_result /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
UserParameter=gmail_stack.borg_check_age,awk '/^borg_check_age_days /{print $2}' /var/lib/gmail_stack_monitor/status 2>/dev/null
